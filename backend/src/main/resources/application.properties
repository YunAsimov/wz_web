spring.application.name=backend
server.port=${SERVER_PORT:8080}

spring.datasource.url=jdbc:mysql://${WZ_DB_HOST:localhost}:${WZ_DB_PORT:3306}/${WZ_DB_NAME:wz_web}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=${WZ_DB_USERNAME:root}
spring.datasource.password=${WZ_DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Shanghai
spring.jpa.properties.hibernate.format_sql=true

server.error.include-message=always

